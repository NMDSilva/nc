<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>NC - Desinfestações</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css" integrity="sha512-HK5fgLBL+xu6dm/Ii3z4xhlSUyZgTT9tuc/hSrtw6uzJOvgRr2a9jyxxT1ely+B+xFAmJKVSTbpM/CuL7qxO8w==" crossorigin="anonymous"/>
    <link rel="stylesheet" href="css/start.css">

  <body>
    <section>
      <div class="box">
        <div class="form">
          <h2>Entrar</h2>
          <form id="loginForm" onsubmit="return validarFormulario()" action="index.html">
            <div class="inputBx">
              <input type="email" name="user" id="user" placeholder="Utilizador" autocomplete="off" value="silvanuno@gmail.com">
              <i class="fas fa-user"></i>
              <span></span>
            </div>
            <div class="inputBx">
              <input type="password" name="password" id="password" placeholder="Password">
              <i class="fas fa-lock"></i>
              <span></span>
            </div>
            <label class="remeber" for="remeber">
              <input type="checkbox" name="remeber" id="remeber">
              Lembrar-me
            </label>
            <div class="inputBx">
              <input type="submit" value="Entrar">
            </div>
          </form>
          <p>Recuperar <a id="recuperar" href="javascript:void(0)">password</a></p>
        </div>
      </div>
    </section>
  </body>
